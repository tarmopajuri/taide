<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Solid green circle background -->
  <circle cx="50" cy="50" r="48" fill="#5BB139"/>
  <circle cx="50" cy="50" r="44" fill="#4A9030"/>

  <!-- Two curved recycling arrows - bold, visible -->
  <!-- Arrow 1: top-right arc -->
  <path d="M 50 18 A 30 30 0 0 1 75 60" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <polygon points="78,56 72,67 82,65" fill="white"/>

  <!-- Arrow 2: bottom-left arc -->
  <path d="M 50 82 A 30 30 0 0 1 25 40" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <polygon points="22,44 28,33 18,35" fill="white"/>

  <!-- Center: stylized material pile (simplified, bold) -->
  <!-- Stone -->
  <ellipse cx="44" cy="55" rx="10" ry="7" fill="rgba(255,255,255,0.35)"/>
  <!-- Wood plank -->
  <rect x="48" y="44" width="14" height="5" rx="2.5" fill="#C49A6C" transform="rotate(-15 55 46)"/>
  <rect x="46" y="52" width="12" height="4.5" rx="2" fill="#7A4A2D" opacity="0.9" transform="rotate(5 52 54)"/>
</svg>
