<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Ring (circular economy) -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#5BB139" stroke-width="5" opacity="0.25"/>
  <path d="M 50 8 A 42 42 0 0 1 88.5 65" fill="none" stroke="#5BB139" stroke-width="5" stroke-linecap="round"/>
  <path d="M 88.5 65 A 42 42 0 0 1 30 89" fill="none" stroke="#7A4A2D" stroke-width="5" stroke-linecap="round"/>
  <path d="M 30 89 A 42 42 0 0 1 50 8" fill="none" stroke="#A0A0A0" stroke-width="5" stroke-linecap="round"/>

  <!-- Arrow heads on ring -->
  <polygon points="52,8 45,14 45,3" fill="#5BB139"/>
  <polygon points="87,67 93,62 82,62" fill="#7A4A2D"/>
  <polygon points="31,87 25,93 36,92" fill="#A0A0A0"/>

  <!-- Stones (maakivid) - minimalistic -->
  <ellipse cx="38" cy="48" rx="11" ry="8" fill="#A0A0A0" opacity="0.85"/>
  <ellipse cx="33" cy="42" rx="7" ry="5" fill="#B8B8B8" opacity="0.8"/>
  <ellipse cx="44" cy="44" rx="6" ry="4.5" fill="#909090" opacity="0.75"/>

  <!-- Wood pieces (puidujäägid) - minimalistic -->
  <rect x="50" y="40" width="16" height="4.5" rx="2" fill="#C49A6C" transform="rotate(-12 58 42)"/>
  <rect x="52" y="47" width="14" height="4" rx="2" fill="#7A4A2D" opacity="0.8" transform="rotate(-5 59 49)"/>
  <rect x="48" y="53" width="15" height="3.5" rx="1.5" fill="#C49A6C" opacity="0.7" transform="rotate(3 55 55)"/>
</svg>
