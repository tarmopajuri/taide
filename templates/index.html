<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taide - Ulejaava taitematerjali jagamine</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2d6a4f;
            --primary-light: #40916c;
            --primary-dark: #1b4332;
            --accent: #d4a373;
            --accent-light: #e9c46a;
            --bg: #fefae0;
            --bg-card: #ffffff;
            --text: #1b1b1b;
            --text-light: #6b7280;
            --border: #d1d5db;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: var(--primary-dark);
            color: white;
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .logo h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .logo-subtitle { font-size: 11px; opacity: 0.7; font-weight: 400; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-add {
            background: var(--accent);
            color: var(--primary-dark);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-add:hover { background: var(--accent-light); transform: translateY(-1px); }

        .btn-auth {
            background: transparent;
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-auth:hover { border-color: white; background: rgba(255,255,255,0.1); }

        .btn-auth-primary {
            background: var(--accent);
            color: var(--primary-dark);
            border-color: var(--accent);
        }

        .btn-auth-primary:hover { background: var(--accent-light); border-color: var(--accent-light); }

        .user-name {
            color: rgba(255,255,255,0.9);
            font-weight: 600;
            font-size: 14px;
        }

        .btn-admin {
            background: #7c3aed;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-admin:hover { background: #6d28d9; }

        /* Filter bar */
        .filter-bar {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 12px 20px;
        }

        .filter-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 7px 16px;
            border: 2px solid var(--border);
            border-radius: 20px;
            background: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 8px 14px 8px 36px;
            border: 2px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus { border-color: var(--primary); }

        .search-box::before {
            content: "\1F50D";
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        /* Main layout */
        .main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 120px);
            max-width: 1400px;
            margin: 0 auto;
        }

        .map-container { position: relative; }
        #map { width: 100%; height: 100%; min-height: 400px; }

        /* Listings panel */
        .listings-panel {
            overflow-y: auto;
            padding: 16px;
            background: #f5f1e3;
        }

        .listings-count {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 12px;
            font-weight: 500;
        }

        .listing-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .listing-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); border-color: var(--primary-light); }
        .listing-card.highlighted { border-color: var(--primary); box-shadow: var(--shadow-lg); }

        .listing-image {
            margin: -16px -16px 12px -16px;
            border-radius: var(--radius) var(--radius) 0 0;
            overflow: hidden;
        }

        .listing-image img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .listing-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 8px;
        }

        .listing-title { font-size: 16px; font-weight: 700; color: var(--text); }

        .material-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-kivi { background: #e2e8f0; color: #475569; }
        .badge-liiv { background: #fef3c7; color: #92400e; }
        .badge-muld { background: #d1fae5; color: #065f46; }
        .badge-purustatud_betoon { background: #e5e7eb; color: #374151; }
        .badge-kruus { background: #fce7f3; color: #9d174d; }
        .badge-muu { background: #ede9fe; color: #5b21b6; }

        .listing-desc {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .listing-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 12px;
            color: var(--text-light);
        }

        .listing-meta span { display: flex; align-items: center; gap: 4px; }

        .listing-contact {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            display: none;
        }

        .listing-card.expanded .listing-contact { display: block; }
        .listing-contact p { margin-bottom: 4px; color: var(--text-light); }
        .listing-contact a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .price-tag { color: var(--primary); font-weight: 700; font-size: 14px; }
        .price-tag.free { color: #059669; }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-delete:hover { background: #dc2626; color: white; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; color: var(--primary-dark); }
        .modal-subtitle { font-size: 13px; color: var(--text-light); margin-bottom: 20px; }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: var(--text); }
        .form-group label .required { color: #dc2626; }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { border-color: var(--primary); }

        .form-group textarea { resize: vertical; min-height: 70px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .form-section-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary-dark);
            margin: 20px 0 12px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        .form-help { font-size: 11px; color: var(--text-light); margin-top: 4px; }

        .btn-row { display: flex; gap: 10px; margin-top: 24px; }

        .btn-submit {
            flex: 1;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            font-family: inherit;
        }

        .btn-submit:hover { background: var(--primary-light); }

        .btn-cancel {
            padding: 12px 24px;
            background: #f3f4f6;
            color: var(--text);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-cancel:hover { background: #e5e7eb; }

        #modal-map {
            height: 200px;
            border-radius: 8px;
            border: 2px solid var(--border);
            margin-top: 6px;
        }

        /* Image upload area */
        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .image-upload-area:hover { border-color: var(--primary); background: #f8fdf9; }
        .image-upload-area.has-image { padding: 8px; border-style: solid; }
        .image-preview img { max-width: 100%; max-height: 200px; border-radius: 6px; }
        .image-placeholder { color: var(--text-light); }
        .image-placeholder div:first-child { font-size: 28px; margin-bottom: 6px; }

        /* Auth modal */
        .auth-modal { max-width: 400px; }

        .auth-tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .auth-error { color: #dc2626; font-size: 13px; margin-bottom: 12px; min-height: 18px; }

        /* Admin panel */
        .admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #f3f4f6;
            z-index: 5000;
            overflow-y: auto;
        }

        .admin-panel.active { display: block; }

        .admin-header {
            background: var(--primary-dark);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h2 { font-size: 20px; font-weight: 800; }

        .admin-close {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .admin-close:hover { background: rgba(255,255,255,0.3); }

        .admin-tabs {
            background: white;
            padding: 0 24px;
            display: flex;
            border-bottom: 1px solid var(--border);
        }

        .admin-tab {
            padding: 14px 20px;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
            font-family: inherit;
        }

        .admin-tab.active { color: var(--primary); border-bottom-color: var(--primary); }

        .admin-content { padding: 24px; max-width: 1200px; margin: 0 auto; }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .admin-table th {
            background: #f9fafb;
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
        }

        .admin-table td {
            padding: 12px 16px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
        }

        .admin-table tr:hover td { background: #f9fafb; }

        .status-active { background: #d1fae5; color: #065f46; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .status-inactive { background: #fee2e2; color: #991b1b; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .role-admin { background: #ede9fe; color: #5b21b6; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
        .role-user { background: #e2e8f0; color: #475569; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }

        .btn-admin-delete {
            background: #dc2626;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-admin-delete:hover { background: #b91c1c; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-dark);
            color: white;
            padding: 14px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            z-index: 6000;
            transition: transform 0.3s;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        /* Responsive */
        @media (max-width: 768px) {
            .main { grid-template-columns: 1fr; height: auto; }
            .map-container { height: 50vh; }
            .listings-panel { min-height: 50vh; }
            .header-inner { padding: 10px 14px; }
            .logo h1 { font-size: 20px; }
            .filter-inner { gap: 6px; }
            .filter-btn { padding: 6px 12px; font-size: 12px; }
            .form-row { grid-template-columns: 1fr; }
            .modal { padding: 20px; }
            .header-actions { gap: 6px; }
            .btn-auth { padding: 6px 12px; font-size: 12px; }
            .btn-add { padding: 8px 14px; font-size: 13px; }
            .admin-table { font-size: 11px; }
            .admin-table th, .admin-table td { padding: 8px 10px; }
        }

        /* Leaflet popup */
        .leaflet-popup-content-wrapper { border-radius: 10px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important; }
        .leaflet-popup-content { margin: 12px 16px !important; font-family: 'Inter', sans-serif !important; }
        .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .popup-info { font-size: 12px; color: #666; line-height: 1.5; }
        .popup-img { width: 100%; max-height: 120px; object-fit: cover; border-radius: 6px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">&#9968;</div>
                <div>
                    <h1>Taide</h1>
                    <div class="logo-subtitle">Jaga ulejaavat taitematerjali</div>
                </div>
            </div>
            <div class="header-actions">
                <div id="authButtons">
                    <button class="btn-auth" onclick="openAuthModal('login')">Logi sisse</button>
                    <button class="btn-auth btn-auth-primary" onclick="openAuthModal('register')">Registreeru</button>
                </div>
                <div id="userInfo" style="display:none;">
                    <span class="user-name" id="userName"></span>
                    <button class="btn-admin" id="adminBtn" style="display:none;" onclick="showAdminPanel()">Admin</button>
                    <button class="btn-auth" onclick="doLogout()">Logi valja</button>
                </div>
                <button class="btn-add" onclick="handleAddClick()">
                    <span>+</span> Lisa kuulutus
                </button>
            </div>
        </div>
    </header>

    <!-- Filters -->
    <div class="filter-bar">
        <div class="filter-inner">
            <button class="filter-btn active" data-type="koik" onclick="setFilter(this)">&#128205; Koik</button>
            <button class="filter-btn" data-type="kivi" onclick="setFilter(this)">&#129704; Kivi</button>
            <button class="filter-btn" data-type="liiv" onclick="setFilter(this)">&#9201; Liiv</button>
            <button class="filter-btn" data-type="muld" onclick="setFilter(this)">&#127793; Muld</button>
            <button class="filter-btn" data-type="purustatud_betoon" onclick="setFilter(this)">&#129521; Betoon</button>
            <button class="filter-btn" data-type="kruus" onclick="setFilter(this)">&#11036; Kruus</button>
            <button class="filter-btn" data-type="muu" onclick="setFilter(this)">&#128230; Muu</button>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Otsi materjali, asukohta..." oninput="debounceSearch()">
            </div>
        </div>
    </div>

    <!-- Main content -->
    <div class="main">
        <div class="map-container">
            <div id="map"></div>
        </div>
        <div class="listings-panel">
            <div class="listings-count" id="listingsCount"></div>
            <div id="listingsList"></div>
        </div>
    </div>

    <!-- Add listing modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal">
            <h2>&#10133; Lisa kuulutus</h2>
            <p class="modal-subtitle">Jaga oma ulejaavat taitematerjali teistega</p>

            <form id="listingForm" onsubmit="submitListing(event)">
                <div class="form-group">
                    <label>Materjali tuup <span class="required">*</span></label>
                    <select name="material_type" required>
                        <option value="">Vali materjali tuup...</option>
                        <option value="kivi">Kivi</option>
                        <option value="liiv">Liiv</option>
                        <option value="muld">Muld / kasvumuld</option>
                        <option value="purustatud_betoon">Purustatud betoon</option>
                        <option value="kruus">Kruus</option>
                        <option value="muu">Muu</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Pealkiri <span class="required">*</span></label>
                    <input type="text" name="title" placeholder="nt. Ehitusliiv tasuta, tule ise jarele" required>
                </div>

                <div class="form-group">
                    <label>Kirjeldus</label>
                    <textarea name="description" placeholder="Kirjelda materjali lahemalt - kogus, kvaliteet, tingimused..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Kogus (ligikaudne)</label>
                        <input type="text" name="quantity" placeholder="nt. ~5">
                    </div>
                    <div class="form-group">
                        <label>Uhik</label>
                        <select name="unit">
                            <option value="tonni">tonni</option>
                            <option value="m3">m3</option>
                            <option value="kotti">kotti</option>
                            <option value="koormaid">koormaid</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Hind</label>
                    <select name="price_type">
                        <option value="tasuta">Tasuta</option>
                        <option value="kokkuleppel">Hind kokkuleppel</option>
                    </select>
                </div>

                <!-- Image upload -->
                <div class="form-section-title">&#128247; Pilt</div>
                <div class="form-group">
                    <div class="image-upload-area" id="imageUploadArea" onclick="document.getElementById('imageInput').click()">
                        <input type="file" id="imageInput" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="previewImage(this)">
                        <div id="imagePreview">
                            <div class="image-placeholder">
                                <div>&#128247;</div>
                                <div>Kliki pildi lisamiseks</div>
                                <div class="form-help">Max 5MB, JPG/PNG/WebP</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contact -->
                <div class="form-section-title">&#128100; Kontaktandmed</div>

                <div class="form-group">
                    <label>Nimi <span class="required">*</span></label>
                    <input type="text" name="contact_name" placeholder="Sinu nimi" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Telefon</label>
                        <input type="tel" name="contact_phone" placeholder="+372 5xx xxxxx">
                    </div>
                    <div class="form-group">
                        <label>E-post</label>
                        <input type="email" name="contact_email" placeholder="email@example.ee">
                    </div>
                </div>

                <!-- Location -->
                <div class="form-section-title">&#128205; Asukoht</div>

                <div class="form-group">
                    <label>Aadress <span class="required">*</span></label>
                    <input type="text" name="address" id="addressInput" placeholder="Tanav, linn" required>
                    <div class="form-help">Kliki kaardil asukoha maaramiseks voi sisesta aadress</div>
                </div>

                <div class="form-group">
                    <div id="modal-map"></div>
                    <input type="hidden" name="latitude" id="latInput">
                    <input type="hidden" name="longitude" id="lngInput">
                </div>

                <div class="btn-row">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Tuhista</button>
                    <button type="submit" class="btn-submit">&#10004; Lisa kuulutus</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Auth modal -->
    <div class="modal-overlay" id="authModalOverlay" onclick="closeAuthModalOutside(event)">
        <div class="modal auth-modal">
            <div class="auth-tabs">
                <button type="button" class="auth-tab active" id="loginTab" onclick="switchAuthTab('login')">Logi sisse</button>
                <button type="button" class="auth-tab" id="registerTab" onclick="switchAuthTab('register')">Registreeru</button>
            </div>

            <form id="loginForm" onsubmit="doLogin(event)">
                <div class="form-group">
                    <label>E-post</label>
                    <input type="email" name="email" placeholder="email@example.ee" required>
                </div>
                <div class="form-group">
                    <label>Parool</label>
                    <input type="password" name="password" placeholder="Parool" required>
                </div>
                <div class="auth-error" id="loginError"></div>
                <button type="submit" class="btn-submit" style="width:100%">Logi sisse</button>
            </form>

            <form id="registerForm" style="display:none" onsubmit="doRegister(event)">
                <div class="form-group">
                    <label>Nimi</label>
                    <input type="text" name="username" placeholder="Sinu nimi" required>
                </div>
                <div class="form-group">
                    <label>E-post</label>
                    <input type="email" name="email" placeholder="email@example.ee" required>
                </div>
                <div class="form-group">
                    <label>Parool</label>
                    <input type="password" name="password" placeholder="Vahemalt 6 marki" required minlength="6">
                </div>
                <div class="auth-error" id="registerError"></div>
                <button type="submit" class="btn-submit" style="width:100%">Registreeru</button>
            </form>
        </div>
    </div>

    <!-- Admin panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-header">
            <h2>Admin paneel</h2>
            <button class="admin-close" onclick="hideAdminPanel()">Sulge</button>
        </div>
        <div class="admin-tabs">
            <button class="admin-tab active" id="adminListingsTab" onclick="switchAdminTab('listings')">Kuulutused</button>
            <button class="admin-tab" id="adminUsersTab" onclick="switchAdminTab('users')">Kasutajad</button>
        </div>
        <div class="admin-content" id="adminContent"></div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // === STATE ===
        let currentUser = null;
        let map, modalMap, modalMarker;
        let markers = [];
        let currentFilter = 'koik';
        let searchTimeout;
        let listings = [];

        const materialLabels = {
            'kivi': 'Kivi', 'liiv': 'Liiv', 'muld': 'Muld',
            'purustatud_betoon': 'Betoon', 'kruus': 'Kruus', 'muu': 'Muu'
        };

        const materialEmojis = {
            'kivi': '\u{1F9F1}', 'liiv': '\u23F1', 'muld': '\u{1F331}',
            'purustatud_betoon': '\u{1F9F1}', 'kruus': '\u2B1C', 'muu': '\u{1F4E6}'
        };

        const markerColors = {
            'kivi': '#64748b', 'liiv': '#d97706', 'muld': '#059669',
            'purustatud_betoon': '#6b7280', 'kruus': '#db2777', 'muu': '#7c3aed'
        };

        // === AUTH ===
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                currentUser = data.user;
                updateAuthUI();
            } catch (e) {
                currentUser = null;
                updateAuthUI();
            }
        }

        function updateAuthUI() {
            const authBtns = document.getElementById('authButtons');
            const userInfo = document.getElementById('userInfo');
            const adminBtn = document.getElementById('adminBtn');

            if (currentUser) {
                authBtns.style.display = 'none';
                userInfo.style.display = 'flex';
                userInfo.style.alignItems = 'center';
                userInfo.style.gap = '10px';
                document.getElementById('userName').textContent = currentUser.username;
                adminBtn.style.display = currentUser.role === 'admin' ? 'inline-block' : 'none';
            } else {
                authBtns.style.display = 'flex';
                authBtns.style.gap = '8px';
                userInfo.style.display = 'none';
            }
        }

        function handleAddClick() {
            if (!currentUser) {
                showToast('Palun logi sisse kuulutuse lisamiseks');
                openAuthModal('login');
                return;
            }
            openModal();
        }

        function openAuthModal(tab) {
            document.getElementById('authModalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            switchAuthTab(tab || 'login');
        }

        function closeAuthModal() {
            document.getElementById('authModalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('loginForm').reset();
            document.getElementById('registerForm').reset();
            document.getElementById('loginError').textContent = '';
            document.getElementById('registerError').textContent = '';
        }

        function closeAuthModalOutside(e) {
            if (e.target === document.getElementById('authModalOverlay')) closeAuthModal();
        }

        function switchAuthTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('registerTab').classList.toggle('active', tab === 'register');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
        }

        async function doLogin(e) {
            e.preventDefault();
            const form = e.target;
            const errEl = document.getElementById('loginError');
            errEl.textContent = '';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    currentUser = data.user;
                    updateAuthUI();
                    closeAuthModal();
                    showToast('Sisse logitud!');
                    loadListings();
                } else {
                    errEl.textContent = data.error || 'Viga sisselogimisel';
                }
            } catch (err) {
                errEl.textContent = 'Vorgu viga';
            }
        }

        async function doRegister(e) {
            e.preventDefault();
            const form = e.target;
            const errEl = document.getElementById('registerError');
            errEl.textContent = '';

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: form.username.value,
                        email: form.email.value,
                        password: form.password.value
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    currentUser = data.user;
                    updateAuthUI();
                    closeAuthModal();
                    showToast('Registreerimine onnestus!');
                    loadListings();
                } else {
                    errEl.textContent = data.error || 'Viga registreerimisel';
                }
            } catch (err) {
                errEl.textContent = 'Vorgu viga';
            }
        }

        async function doLogout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            currentUser = null;
            updateAuthUI();
            showToast('Valja logitud!');
            loadListings();
        }

        // === MAP ===
        function initMap() {
            map = L.map('map').setView([58.8, 25.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 18
            }).addTo(map);
            loadListings();
        }

        function createMarkerIcon(type) {
            const color = markerColors[type] || '#2d6a4f';
            return L.divIcon({
                className: '',
                html: `<div style="
                    width: 28px; height: 28px;
                    background: ${color};
                    border: 3px solid white;
                    border-radius: 50%;
                    box-shadow: 0 2px 6px rgba(0,0,0,0.35);
                    display: flex; align-items: center; justify-content: center;
                    font-size: 13px;
                ">${materialEmojis[type] || ''}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14],
                popupAnchor: [0, -16]
            });
        }

        // === LISTINGS ===
        async function loadListings() {
            try {
                const params = new URLSearchParams();
                if (currentFilter !== 'koik') params.set('material_type', currentFilter);
                const search = document.getElementById('searchInput').value.trim();
                if (search) params.set('search', search);

                const res = await fetch('/api/listings?' + params.toString());
                listings = await res.json();
                renderListings();
                renderMarkers();
            } catch (err) {
                console.error('Viga kuulutuste laadimisel:', err);
            }
        }

        function canDelete(l) {
            if (!currentUser) return false;
            if (currentUser.role === 'admin') return true;
            return l.user_id === currentUser.id;
        }

        function renderListings() {
            const container = document.getElementById('listingsList');
            const countEl = document.getElementById('listingsCount');

            countEl.textContent = `${listings.length} kuulutus${listings.length !== 1 ? 't' : ''}`;

            if (listings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">&#128270;</div>
                        <p>Kuulutusi ei leitud</p>
                        <p style="font-size:12px; margin-top:8px;">Proovi teist filtrit voi lisa uus kuulutus</p>
                    </div>`;
                return;
            }

            container.innerHTML = listings.map(l => `
                <div class="listing-card" id="card-${l.id}" onclick="toggleCard(${l.id})">
                    ${l.image_url ? `<div class="listing-image"><img src="${escapeHtml(l.image_url)}" alt=""></div>` : ''}
                    <div class="listing-header">
                        <div class="listing-title">${escapeHtml(l.title)}</div>
                        <span class="material-badge badge-${l.material_type}">${materialLabels[l.material_type] || l.material_type}</span>
                    </div>
                    ${l.description ? `<div class="listing-desc">${escapeHtml(l.description)}</div>` : ''}
                    <div class="listing-meta">
                        <span>&#128205; ${escapeHtml(l.address)}</span>
                        ${l.quantity ? `<span>&#128230; ${escapeHtml(l.quantity)} ${escapeHtml(l.unit || '')}</span>` : ''}
                        <span class="price-tag ${l.price_type === 'tasuta' ? 'free' : ''}">
                            ${l.price_type === 'tasuta' ? '&#10004; Tasuta' : '&#128176; Hind kokkuleppel'}
                        </span>
                    </div>
                    <div class="listing-contact">
                        <p><strong>${escapeHtml(l.contact_name)}</strong></p>
                        ${l.contact_phone ? `<p>&#128222; <a href="tel:${l.contact_phone}">${escapeHtml(l.contact_phone)}</a></p>` : ''}
                        ${l.contact_email ? `<p>&#9993; <a href="mailto:${l.contact_email}">${escapeHtml(l.contact_email)}</a></p>` : ''}
                        <p style="font-size:11px;color:#999;margin-top:6px;">Lisatud: ${new Date(l.created_at).toLocaleDateString('et-EE')}</p>
                        ${canDelete(l) ? `<button class="btn-delete" onclick="event.stopPropagation(); deleteListing(${l.id})">Kustuta kuulutus</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            listings.forEach(l => {
                if (!l.latitude || !l.longitude) return;

                const marker = L.marker([l.latitude, l.longitude], {
                    icon: createMarkerIcon(l.material_type)
                }).addTo(map);

                marker.bindPopup(`
                    ${l.image_url ? `<img class="popup-img" src="${escapeHtml(l.image_url)}" alt="">` : ''}
                    <div class="popup-title">${escapeHtml(l.title)}</div>
                    <div class="popup-info">
                        <strong>${materialLabels[l.material_type] || l.material_type}</strong><br>
                        ${escapeHtml(l.address)}<br>
                        ${l.quantity ? l.quantity + ' ' + (l.unit || '') + '<br>' : ''}
                        <strong style="color:${l.price_type === 'tasuta' ? '#059669' : '#d97706'}">
                            ${l.price_type === 'tasuta' ? 'Tasuta' : 'Hind kokkuleppel'}
                        </strong><br>
                        ${l.contact_phone ? '&#128222; ' + escapeHtml(l.contact_phone) + '<br>' : ''}
                        ${l.contact_email ? '&#9993; ' + escapeHtml(l.contact_email) : ''}
                    </div>
                `);

                marker.on('click', () => highlightCard(l.id));
                marker.listingId = l.id;
                markers.push(marker);
            });

            if (markers.length > 0) {
                const group = L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.1));
            }
        }

        async function deleteListing(id) {
            if (!confirm('Kas oled kindel, et soovid selle kuulutuse kustutada?')) return;

            try {
                const res = await fetch(`/api/listings/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Kuulutus kustutatud!');
                    loadListings();
                } else {
                    const data = await res.json();
                    showToast('Viga: ' + (data.error || 'Midagi laks valesti'));
                }
            } catch (err) {
                showToast('Vorgu viga');
            }
        }

        // === CARD INTERACTIONS ===
        function toggleCard(id) {
            const card = document.getElementById(`card-${id}`);
            const wasExpanded = card.classList.contains('expanded');

            document.querySelectorAll('.listing-card.expanded').forEach(c => c.classList.remove('expanded'));

            if (!wasExpanded) card.classList.add('expanded');

            const listing = listings.find(l => l.id === id);
            if (listing && listing.latitude && listing.longitude) {
                map.setView([listing.latitude, listing.longitude], 14, { animate: true });
                markers.forEach(m => { if (m.listingId === id) m.openPopup(); });
            }
        }

        function highlightCard(id) {
            document.querySelectorAll('.listing-card.highlighted').forEach(c => c.classList.remove('highlighted'));
            const card = document.getElementById(`card-${id}`);
            if (card) {
                card.classList.add('highlighted');
                card.classList.add('expanded');
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // === FILTERS ===
        function setFilter(btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.dataset.type;
            loadListings();
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(loadListings, 300);
        }

        // === LISTING MODAL ===
        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';

            // Pre-fill contact info from user
            if (currentUser) {
                const form = document.getElementById('listingForm');
                form.contact_name.value = currentUser.username || '';
                form.contact_email.value = currentUser.email || '';
            }

            setTimeout(() => {
                if (!modalMap) {
                    modalMap = L.map('modal-map').setView([59.437, 24.7536], 11);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OSM', maxZoom: 18
                    }).addTo(modalMap);

                    modalMap.on('click', function(e) {
                        const { lat, lng } = e.latlng;
                        document.getElementById('latInput').value = lat.toFixed(6);
                        document.getElementById('lngInput').value = lng.toFixed(6);

                        if (modalMarker) {
                            modalMarker.setLatLng(e.latlng);
                        } else {
                            modalMarker = L.marker(e.latlng).addTo(modalMap);
                        }
                    });
                } else {
                    modalMap.invalidateSize();
                }
            }, 100);
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('listingForm').reset();
            if (modalMarker) {
                modalMap.removeLayer(modalMarker);
                modalMarker = null;
            }
            document.getElementById('latInput').value = '';
            document.getElementById('lngInput').value = '';
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreview').innerHTML = '<div class="image-placeholder"><div>&#128247;</div><div>Kliki pildi lisamiseks</div><div class="form-help">Max 5MB, JPG/PNG/WebP</div></div>';
            document.getElementById('imageUploadArea').classList.remove('has-image');
        }

        function closeModalOutside(e) {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        }

        function previewImage(input) {
            const file = input.files[0];
            const area = document.getElementById('imageUploadArea');
            const preview = document.getElementById('imagePreview');

            if (file) {
                if (file.size > 5 * 1024 * 1024) {
                    showToast('Pilt on liiga suur (max 5MB)');
                    input.value = '';
                    return;
                }
                preview.innerHTML = `<img src="${URL.createObjectURL(file)}" alt="Eelvaade">`;
                area.classList.add('has-image');
            }
        }

        async function submitListing(e) {
            e.preventDefault();

            const form = e.target;
            const lat = document.getElementById('latInput').value;
            const lng = document.getElementById('lngInput').value;

            if (!lat || !lng) {
                showToast('Palun kliki kaardil asukoha maaramiseks!');
                return;
            }

            // Upload image first if selected
            let image_url = '';
            const imageInput = document.getElementById('imageInput');
            if (imageInput.files.length > 0) {
                const formData = new FormData();
                formData.append('file', imageInput.files[0]);

                try {
                    const uploadRes = await fetch('/api/upload', { method: 'POST', body: formData });
                    if (uploadRes.status === 413) {
                        showToast('Pilt on liiga suur (max 5MB)');
                        return;
                    }
                    const uploadData = await uploadRes.json();
                    if (uploadData.success) {
                        image_url = uploadData.image_url;
                    } else {
                        showToast('Pildi uleslaadimine ebaonnestus: ' + (uploadData.error || ''));
                        return;
                    }
                } catch (err) {
                    showToast('Pildi uleslaadimine ebaonnestus');
                    return;
                }
            }

            const data = {
                material_type: form.material_type.value,
                title: form.title.value,
                description: form.description.value,
                quantity: form.quantity.value,
                unit: form.unit.value,
                price_type: form.price_type.value,
                contact_name: form.contact_name.value,
                contact_phone: form.contact_phone.value,
                contact_email: form.contact_email.value,
                address: form.address.value,
                latitude: parseFloat(lat),
                longitude: parseFloat(lng),
                image_url: image_url
            };

            try {
                const res = await fetch('/api/listings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    closeModal();
                    showToast('Kuulutus edukalt lisatud!');
                    loadListings();
                } else {
                    const err = await res.json();
                    showToast('Viga: ' + (err.error || 'Midagi laks valesti'));
                }
            } catch (err) {
                showToast('Vorgu viga, proovi uuesti');
            }
        }

        // === ADMIN ===
        async function showAdminPanel() {
            document.getElementById('adminPanel').classList.add('active');
            document.body.style.overflow = 'hidden';
            switchAdminTab('listings');
        }

        function hideAdminPanel() {
            document.getElementById('adminPanel').classList.remove('active');
            document.body.style.overflow = '';
        }

        function switchAdminTab(tab) {
            document.getElementById('adminListingsTab').classList.toggle('active', tab === 'listings');
            document.getElementById('adminUsersTab').classList.toggle('active', tab === 'users');
            if (tab === 'listings') loadAdminListings();
            else loadAdminUsers();
        }

        async function loadAdminListings() {
            const content = document.getElementById('adminContent');
            try {
                const res = await fetch('/api/admin/listings');
                const data = await res.json();
                content.innerHTML = `
                    <p style="margin-bottom:16px;color:var(--text-light);">Kokku ${data.length} kuulutust</p>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Pealkiri</th>
                                <th>Tuup</th>
                                <th>Asukoht</th>
                                <th>Staatus</th>
                                <th>Kasutaja</th>
                                <th>Kuupaev</th>
                                <th>Tegevus</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(l => `
                                <tr>
                                    <td>${l.id}</td>
                                    <td><strong>${escapeHtml(l.title)}</strong></td>
                                    <td>${materialLabels[l.material_type] || l.material_type}</td>
                                    <td>${escapeHtml(l.address || '')}</td>
                                    <td><span class="${l.is_active ? 'status-active' : 'status-inactive'}">${l.is_active ? 'Aktiivne' : 'Kustutatud'}</span></td>
                                    <td>${l.user_id || '-'}</td>
                                    <td>${new Date(l.created_at).toLocaleDateString('et-EE')}</td>
                                    <td><button class="btn-admin-delete" onclick="adminDeleteListing(${l.id})">Kustuta</button></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                content.innerHTML = '<p>Viga andmete laadimisel</p>';
            }
        }

        async function loadAdminUsers() {
            const content = document.getElementById('adminContent');
            try {
                const res = await fetch('/api/admin/users');
                const data = await res.json();
                content.innerHTML = `
                    <p style="margin-bottom:16px;color:var(--text-light);">Kokku ${data.length} kasutajat</p>
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nimi</th>
                                <th>E-post</th>
                                <th>Roll</th>
                                <th>Liitunud</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(u => `
                                <tr>
                                    <td>${u.id}</td>
                                    <td><strong>${escapeHtml(u.username)}</strong></td>
                                    <td>${escapeHtml(u.email)}</td>
                                    <td><span class="${u.role === 'admin' ? 'role-admin' : 'role-user'}">${u.role}</span></td>
                                    <td>${new Date(u.created_at).toLocaleDateString('et-EE')}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>`;
            } catch (err) {
                content.innerHTML = '<p>Viga andmete laadimisel</p>';
            }
        }

        async function adminDeleteListing(id) {
            if (!confirm('Kas oled kindel? See kustutab kuulutuse LOPPLIKULT!')) return;
            try {
                const res = await fetch(`/api/admin/listings/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    showToast('Kuulutus lopplikult kustutatud!');
                    loadAdminListings();
                }
            } catch (err) {
                showToast('Viga kustutamisel');
            }
        }

        // === UTILS ===
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerHTML = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // === INIT ===
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            initMap();
        });
    </script>
</body>
</html>
